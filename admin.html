<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админка Philantrade</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: system-ui; background: #f5f7fb; padding: 24px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: white; border-radius: 24px; padding: 24px; margin-bottom: 24px; }
        button { background: #1e3a5f; color: white; border: none; padding: 8px 16px; border-radius: 40px; cursor: pointer; margin-right: 8px; }
        .approve { background: #1e7b48; }
        .reject { background: #c23d1c; }
    </style>
</head>
<body>
<div class="container" id="app">Загрузка...</div>

<script>
    const SUPABASE_URL = 'https://xatvmdctucbyacxqffxi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhhdHZtZGN0dWNieWFjeHFmZnhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDkxMzAsImV4cCI6MjA5MDYyNTEzMH0.xUbZtT0_spWI4b_tnZJx01NEFzLA0agdDUiWCPhWZ04';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Простая защита паролем
    let authenticated = false;

    function checkAuth() {
        const password = prompt('Введите пароль администратора:');
        if (password === 'admin123') { // Замени на свой пароль
            authenticated = true;
            loadReports();
        } else {
            document.getElementById('app').innerHTML = '<div class="card">Неверный пароль</div>';
        }
    }

    async function loadReports() {
        const { data } = await supabase
            .from('reports')
            .select('*, shelters(name, wallet_address)')
            .eq('status', 'pending')
            .order('created_at', { ascending: false });

        if (!data || data.length === 0) {
            document.getElementById('app').innerHTML = '<div class="card">Нет отчётов на модерации</div>';
            return;
        }

        let html = '<h1>Админка Philantrade</h1>';
        for (const report of data) {
            html += `
                <div class="card">
                    <h3>${report.shelters.name}</h3>
                    <p><strong>Сумма:</strong> ${report.amount_usdt} USDT</p>
                    <p><strong>Описание:</strong> ${report.description}</p>
                    <button class="approve" onclick="approveReport(${report.id})">✅ Опубликовать</button>
                    <button class="reject" onclick="rejectReport(${report.id})">❌ Отклонить</button>
                </div>
            `;
        }
        document.getElementById('app').innerHTML = html;
    }

    async function approveReport(id) {
        await supabase.from('reports').update({ status: 'approved', published_at: new Date() }).eq('id', id);
        loadReports();
    }

    async function rejectReport(id) {
        await supabase.from('reports').update({ status: 'rejected' }).eq('id', id);
        loadReports();
    }

    checkAuth();
</script>
</body>
</html>
