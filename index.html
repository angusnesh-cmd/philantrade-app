<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philantrade</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        h1 { color: #1e3a5f; margin-bottom: 16px; }
        p { color: #5b6e8c; margin-bottom: 24px; }
        .status { color: #1e7b48; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Philantrade</h1>
        <p>Прозрачная помощь приютам</p>
        <p class="status">✅ Vercel работает!</p>
        <p>Следующий шаг — подключение Supabase</p>
    </div>
</body>
</html>
