<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет | Philantrade</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 24px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        h1, h2 {
            color: #1e3a5f;
        }
        .pending-amount {
            font-size: 48px;
            font-weight: 700;
            color: #1e3a5f;
        }
        button {
            background: #1e3a5f;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
        }
        .logout-btn {
            background: #e2e8f0;
            color: #1a2c3e;
            float: right;
        }
        .report-item {
            border-bottom: 1px solid #edf2f7;
            padding: 16px 0;
        }
        .status-pending { color: #b86b00; }
        .status-approved { color: #1e7b48; }
        .status-rejected { color: #c23d1c; }
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            margin-bottom: 16px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
<div class="container" id="app">Загрузка...</div>

<!-- Загружаем Supabase -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
    // Ждём полной загрузки страницы и библиотеки
    window.addEventListener('DOMContentLoaded', function() {
        // Проверяем, что createClient загрузился
        if (typeof createClient === 'undefined') {
            document.getElementById('app').innerHTML = '<div class="card">Ошибка: библиотека Supabase не загрузилась. Обновите страницу.</div>';
            return;
        }

        const SUPABASE_URL = 'https://xatvmdctucbyacxqffxi.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhhdHZtZGN0dWNieWFjeHFmZnhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDkxMzAsImV4cCI6MjA5MDYyNTEzMH0.xUbZtT0_spWI4b_tnZJx01NEFzLA0agdDUiWCPhWZ04';

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentShelter = null;

        async function checkAuth() {
            const { data: { user }, error } = await supabase.auth.getUser();
            
            if (error || !user) {
                window.location.href = '/';
                return;
            }

            const { data: shelter, error: shelterError } = await supabase
                .from('shelters')
                .select('*')
                .eq('email', user.email)
                .single();

            if (shelterError || !shelter) {
                window.location.href = '/';
                return;
            }

            currentShelter = shelter;
            loadData();
        }

        async function loadData() {
            const { data: pending } = await supabase
                .from('pending_amounts')
                .select('amount_usdt')
                .eq('shelter_id', currentShelter.id)
                .order('created_at', { ascending: false })
                .limit(1);

            const pendingAmount = pending && pending.length > 0 ? pending[0].amount_usdt : 0;

            const { data: reports } = await supabase
                .from('reports')
                .select('*')
                .eq('shelter_id', currentShelter.id)
                .order('created_at', { ascending: false });

            renderDashboard(pendingAmount, reports || []);
        }

        async function submitReport() {
            const description = document.getElementById('reportDesc').value;
            if (!description) {
                alert('Введите описание');
                return;
            }

            const { error } = await supabase.from('reports').insert({
                shelter_id: currentShelter.id,
                amount_usdt: 0,
                description: description,
                photos: [],
                video: null,
                status: 'pending'
            });

            if (error) {
                alert('Ошибка: ' + error.message);
            } else {
                alert('Отчёт отправлен на проверку!');
                window.location.reload();
            }
        }

        function renderDashboard(pendingAmount, reports) {
            const reportsHtml = reports.map(r => `
                <div class="report-item">
                    <strong>${r.amount_usdt} USDT</strong>
                    <span class="status-${r.status}">
                        ${r.status === 'pending' ? 'На проверке' : r.status === 'approved' ? 'Опубликован' : 'Отклонён'}
                    </span>
                    <p>${r.description || ''}</p>
                    <small>${new Date(r.created_at).toLocaleDateString('ru-RU')}</small>
                </div>
            `).join('');

            document.getElementById('app').innerHTML = `
                <div class="card">
                    <button class="logout-btn" id="logoutBtn">Выйти</button>
                    <h1>${currentShelter.name}</h1>
                    <p>${currentShelter.email}</p>
                </div>
                <div class="card">
                    <h2>К отчёту сейчас</h2>
                    <div class="pending-amount">${pendingAmount} USDT</div>
                </div>
                <div class="card">
                    <h2>Новый отчёт</h2>
                    <textarea id="reportDesc" rows="4" placeholder="На что потратили средства?"></textarea>
                    <button id="submitBtn">Отправить отчёт</button>
                </div>
                <div class="card">
                    <h2>История отчётов</h2>
                    ${reportsHtml || 'Пока нет отчётов'}
                </div>
            `;

            document.getElementById('logoutBtn').addEventListener('click', async () => {
                await supabase.auth.signOut();
                window.location.href = '/';
            });
            document.getElementById('submitBtn').addEventListener('click', submitReport);
        }

        checkAuth();
    });
</script>
</body>
</html>
